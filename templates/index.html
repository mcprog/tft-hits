<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set 17 Epic Match Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div class="max-w-2xl mx-auto mt-16 px-4">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-6 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                Set 17 Tracker
            </h1>
            <p class="text-lg text-slate-300 leading-relaxed mb-6">
                Filtering your match history for <strong>Space Gods</strong> high-rolls. 
                Find games where you hit a <span class="text-purple-400 font-semibold">Prismatic Trait</span> 
                or a <span class="text-yellow-400 font-semibold">3-Star 4/5 Cost unit</span>.
            </p>
            <div class="h-1 w-20 bg-blue-500 mx-auto rounded-full"></div>
        </div>

        <div class="bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
            <form action="/games" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Riot ID</label>
                    <div class="flex flex-col md:flex-row gap-3">
                        <input type="text" name="username" placeholder="RiotId#Tag" required
                               class="flex-1 p-4 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-500">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-lg font-bold transition-all">
                            Search
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
